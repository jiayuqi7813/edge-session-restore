name: Deploy Pages

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Check whether GitHub Pages is enabled
        id: pages_status
        run: |
          status_code="$(curl -sS -o /tmp/pages.json -w '%{http_code}' \
            -H 'Accept: application/vnd.github+json' \
            -H 'Authorization: Bearer ${{ github.token }}' \
            "https://api.github.com/repos/${{ github.repository }}/pages")"

          if [ "$status_code" = "200" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "GitHub Pages is enabled for this repository." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "GitHub Pages is not enabled yet." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Enable it in Settings > Pages and set Source to GitHub Actions, then rerun this workflow." >> "$GITHUB_STEP_SUMMARY"
          fi

      - uses: actions/configure-pages@v5
        if: steps.pages_status.outputs.enabled == 'true'

      - name: Upload docs as Pages artifact
        if: steps.pages_status.outputs.enabled == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        if: steps.pages_status.outputs.enabled == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
